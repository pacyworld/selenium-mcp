name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: FreeBSD
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Syntax check
        run: |
          find classes/ tools/ bin/ system/ includes/ libraries/EnchiladaMCP/ libraries/EnchiladaHTTP/ libraries/EnchiladaWebSocket/ -name '*.php' -exec php -l {} \; | grep -v "No syntax errors" && exit 1 || true

      - name: Verify MCP Initialize
        run: |
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' | \
            SELENIUM_GRID_URL=http://localhost:4444 php bin/selenium-mcp | \
            php -r '$d=json_decode(file_get_contents("php://stdin"),true); $n=$d["result"]["serverInfo"]["name"] ?? ""; if($n!=="Selenium MCP"){echo "FAIL: got {$n}\n";exit(1);} echo "MCP init OK\n";'
